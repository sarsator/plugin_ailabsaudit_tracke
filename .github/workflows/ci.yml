name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  log-agent:
    name: Log Agent (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Tests (with race detector)
        working-directory: collectors/log-agent
        run: go test -v -race ./...

      - name: Build (linux/amd64)
        working-directory: collectors/log-agent
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /dev/null .

      - name: Build (linux/arm64)
        working-directory: collectors/log-agent
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o /dev/null .

  wordpress:
    name: WordPress (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        php-version: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer, phpcs, phpunit

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ matrix.php-version }}-

      - name: Install WPCS
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction \
            wp-coding-standards/wpcs \
            dealerdirect/phpcodesniffer-composer-installer

      - name: HMAC tests
        run: php collectors/wordpress/tests/test-hmac.php

      - name: PHPCS (WordPress standard)
        run: |
          phpcs --standard=collectors/wordpress/phpcs.xml.dist \
            --ignore=tests/ \
            collectors/wordpress/

  php:
    name: PHP Generic (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        php-version: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: HMAC tests
        run: php collectors/php/tests/HmacTest.php

      - name: Detection tests
        run: php collectors/php/tests/DetectionTest.php

      - name: Buffer tests
        run: php collectors/php/tests/BufferTest.php

  python:
    name: Python (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('collectors/python/pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install pytest
        run: pip install pytest

      - name: HMAC tests
        working-directory: collectors/python
        run: python -m pytest tests/ -v

  cloudflare:
    name: Cloudflare Worker (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: HMAC tests
        run: node collectors/cloudflare-worker/tests/hmac.test.js

      - name: Detection tests
        run: node collectors/cloudflare-worker/tests/detection.test.js

  integration:
    name: Integration (cross-collector)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [log-agent, wordpress, php, python, cloudflare]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cross-language HMAC validation (openssl reference)
        run: bash integration-tests/test-hmac-vectors.sh

      - name: HMAC vector validation
        run: node integration-tests/validate-vectors.js

      - name: Cross-collector list validation
        run: node integration-tests/validate-lists.js
